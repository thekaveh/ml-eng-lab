name: Docs gate

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'notebooks/**/README.md'
      - 'notebooks/**/docs/spec.yaml'
      - 'mkdocs.yml'
      - 'scripts/docs/**'
      - 'docs-requirements.txt'
      - 'Makefile'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install system dependencies for cairosvg
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs-requirements.txt

      - name: Install documentation dependencies
        run: pip install -r docs-requirements.txt

      - name: Render diagrams + generate + gate
        run: make docs-check

      - name: Lint docs scripts
        run: ruff check scripts/docs/

      - name: Unit tests (docs scripts)
        run: pytest tests/test_manifest.py tests/test_links.py tests/test_transforms.py tests/test_render_diagrams.py tests/test_build_docs.py tests/test_wiki.py tests/test_check_docs.py tests/test_push_wiki.py -v
