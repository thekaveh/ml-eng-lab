name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly smoke of Tier-B/C papermill targets, surfaces env drift early.
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  pytest-nnx-surface:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-core-requirements.txt
            torch-requirements.txt

      - name: Install dependencies
        run: |
          make install-torch-stack
          pip install -r requirements.txt

      - name: Lint (ruff check)
        run: make lint

      - name: Verify nnx import
        run: python -c "import nnx; print(nnx.__file__)"

      - name: Run NNx-surface tests
        run: make test-nnx-surface

  verify-repo:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-core-requirements.txt
            torch-requirements.txt

      - name: Install dependencies
        run: |
          make install-torch-stack
          pip install -r requirements.txt

      - name: Run repo verifier
        run: make verify

  docs-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs-requirements.txt

      - name: Install documentation dependencies
        run: pip install -r docs-requirements.txt

      - name: Build documentation site
        run: make docs-build

  docker-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t ml-eng-lab-ci .

  tier-a-papermill:
    runs-on: ubuntu-24.04
    # 19 Tier-A notebooks (mnist-pytorch moved to Tier-B per issue #7; quantization-mnist-pytorch originally moved to Tier-B per issue #10, then removed from TIER_B on 2026-06-16 after the weekly cron confirmed it cannot run in CI's pinned env — manual-only now). Cumulative ~7 min on a macOS M-series CPU but Linux
    # GH Actions runners are ~3-4× slower for hand-coded numpy training
    # (image_classification-mnist-ffnn-numpy is the worst offender — observed
    # ~30 min on its own at PR-#5 HEAD edcab84). 90 min cap leaves headroom
    # for the heaviest notebook AND room for the issue-#3 phase1 dataset
    # download, while still failing fast vs GH's default 6 h.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-core-requirements.txt
            torch-requirements.txt

      - name: Install dependencies
        run: |
          make install-torch-stack
          pip install -r requirements.txt

      - name: Download spaCy en_core_web_sm model
        # Needed by text_classification-agnews-spacy-mlp-pytorch and
        # sentiment_classification-vader-mlp-pytorch. `pip install spacy` does NOT pull
        # the language model — it's a separate download.
        run: python -m spacy download en_core_web_sm

      - name: Download NLTK vader_lexicon
        # Needed by sentiment_classification-vader-mlp-pytorch. The notebook also has a
        # lazy fallback download, but doing it here once is faster + offline-safe in CI.
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Verify nnx import
        run: python -c "import nnx; print(nnx.__file__)"

      - name: Run Tier-A notebooks (papermill)
        run: make run-tier-a

      - name: Check Tier-A notebook outputs are committed
        run: make check-tier-a-clean

      - name: Upload refreshed notebook outputs as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tier-a-notebooks
          # All 19 Tier-A notebooks — keep in sync with Makefile TIER_A.
          # (mnist-pytorch moved to Tier-B per issue #7; quantization-mnist-pytorch
          # originally moved to Tier-B per issue #10 — torchao>=0.17 (the
          # requirements.txt pin) imports `torch.int1` at module load, which
          # was added in torch 2.5; ml-eng-lab pins torch==2.4.1 for genai-vanilla
          # image-parity. The Tier-B move turned out insufficient — the notebook
          # still cannot run in CI's pinned env — so it was removed from
          # Makefile TIER_B on 2026-06-16 and is now a manual-only task. See
          # Makefile TIER_B section for full rationale.)
          path: |
            notebooks/image_classification-mnist-ffnn-numpy/notebook.ipynb
            notebooks/node_classification-reddit-gnn-pyg/phase1-dataset-exploration-notebook.ipynb
            notebooks/tabular_classification-iris-mlp-pytorch/notebook.ipynb
            notebooks/model_surgery-mnist-ffnn-pytorch/notebook.ipynb
            notebooks/pruning-mnist-ffnn-pytorch/notebook.ipynb
            notebooks/knowledge_distillation-mnist-ffnn-pytorch/notebook.ipynb
            notebooks/text_generation-tinyshakespeare-transformer-pytorch/notebook.ipynb
            notebooks/peft-mnist-to-fmnist-dora-vs-lora-pytorch/notebook.ipynb
            notebooks/dim_reduction-iris-autoencoder-pytorch/notebook.ipynb
            notebooks/tabular_regression-diabetes-mlp-pytorch/notebook.ipynb
            notebooks/diffusion-mnist-ddpm-pytorch/notebook.ipynb
            notebooks/moe-fmnist-mixture-of-experts-pytorch/notebook.ipynb
            notebooks/clustering-iris-kmeans-vs-ae-pytorch/notebook.ipynb
            notebooks/link_prediction-karate-graphsage-pyg/notebook.ipynb
            notebooks/community_detection-karate-louvain-vs-gnn-pyg/notebook.ipynb
            notebooks/text_classification-agnews-spacy-mlp-pytorch/notebook.ipynb
            notebooks/sentiment_classification-vader-mlp-pytorch/notebook.ipynb
            notebooks/preference_alignment-toy-dpo-pytorch/notebook.ipynb
            notebooks/self_supervised-fmnist-jepa-pytorch/notebook.ipynb
          retention-days: 7

  smoke-tier-b:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    if: |
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || contains(github.event.pull_request.labels.*.name, 'tier-b-smoke')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-core-requirements.txt
            torch-requirements.txt

      - name: Install dependencies
        run: |
          make install-torch-stack
          pip install -r requirements.txt

      - name: Smoke-run Tier-B notebooks
        run: make smoke-tier-b

  smoke-tier-c:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            torch-core-requirements.txt
            torch-requirements.txt

      - name: Install dependencies
        run: |
          make install-torch-stack
          pip install -r requirements.txt

      - name: Smoke-run Tier-C notebooks
        run: make smoke-tier-c
