title: "Preference alignment — toy DPO"
family: language
tier: A
dataset: 16 hand-written (prompt, chosen, rejected) triplets
model: Tiny TransformerNN (ref frozen + policy trained)
framework: "PyTorch (via nnx [lm])"
concepts: [preference alignment, Direct Preference Optimization, chosen-rejected log-prob gap, reference vs policy, temperature beta, auto-freezing reference, NNPreferenceDataset, BPE tokenizer, decoder-only transformer]
math:
  - id: dpo-loss
    label: "DPO loss (Bradley-Terry + implicit reward)"
    latex: "\\mathcal{L}_{\\mathrm{DPO}} = -\\mathbb{E}[\\log \\sigma(\\beta \\log \\frac{\\pi_\\theta(y_w|x)}{\\pi_{\\mathrm{ref}}(y_w|x)} - \\beta \\log \\frac{\\pi_\\theta(y_l|x)}{\\pi_{\\mathrm{ref}}(y_l|x)})]"
  - id: gap
    label: "Chosen-rejected log-prob gap (the contract)"
    latex: "\\mathrm{gap} = \\mathbb{E}[\\log \\pi_\\theta(y_w|x) - \\log \\pi_\\theta(y_l|x)]"
code_walkthrough:
  - { anchor: "policy.net.load_state_dict(ref_model.net.state_dict())", note: "policy starts bit-identical to ref (DPO init sanity: loss = log 2)" }
  - { anchor: "dpo_train_step_factory(ref_model, beta=0.1, pad_token_id=1)", note: "auto-freezes ref (requires_grad=False + eval); returns train_step_fn" }
  - { anchor: "NNPreferenceDataset(...)", note: "packages (prompt, chosen, rejected) triplets with padding" }
results:
  - { metric: "gap BEFORE DPO", value: "+2.1434" }
  - { metric: "gap AFTER DPO", value: "+59.6521" }
  - { metric: "gap delta (DPO contract)", value: "+57.5087 > 0 (PASS)" }
  - { metric: "DPO loss", value: "0.6931 (= log 2) -> 0.0039 (48 iters)" }
pitfalls:
  - "Recorded +59.65 is the post-training gap, not the delta (+57.51); gap is large from overfitting 16 triplets."
  - "No held-out win-rate eval (16 triplets too few to carve off); gap measures train signal, not generalization."
  - "beta=0.1 is paper default; production sweeps {0.01, 0.1, 0.5} by held-out win-rate."
  - "Ref is frozen inside the factory, not in notebook code; build a fresh NNModel to train again."
  - "BPE target vocab 80 unreachable on 10-line corpus; effective vocab 52."
extensions:
  - "Add held-out win-rate eval (Anthropic HH-RLHF / UltraFeedback at scale)."
  - "Sweep beta in {0.01, 0.1, 0.5}; try IPO (regularization) and KTO (unpaired) variants."
  - "Scale model to 7B + thousands of triplets; gap shrinks but generalizes, contract holds."
depth: full
