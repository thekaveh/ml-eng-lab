# Docker Compose override for ml-eng-lab integration with genai-vanilla.
#
# This file lives in the ml-eng-lab repo. It is NOT auto-discovered by Docker
# Compose. Use `scripts/start-jupyterhub.sh` which sets the required
# env vars and layers this file onto genai-vanilla's base compose
# (the pinned submodule snapshot at vendor/genai-vanilla).
#
# Required env vars:
#   ML_REPO_PATH    absolute path to the ml-eng-lab repo root
#   ML_SSH_MOUNT_DIR absolute path mounted at /home/jovyan/.ssh
#                    (wrapper defaults to an empty ignored dir; set HOST_SSH_DIR
#                    explicitly to opt into mounting host SSH keys)

services:
  jupyterhub:
    volumes:
      - ${ML_REPO_PATH}:/home/jovyan/work/ml-eng-lab
      - ${ML_SSH_MOUNT_DIR}:/home/jovyan/.ssh:ro
